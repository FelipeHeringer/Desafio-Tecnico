<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:schemaLocation="http://xmlns.jcp.org/jsf/html https://jakarta.ee/xml/ns/jakartaee/jsf-html.xsd">

<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão Casas</title>
    <link rel="stylesheet" href="#{request.contextPath}/css/Register.css" />
</h:head>

<h:body>
    <h:form>
        <fieldset>
            <legend>Cadastre-se</legend>

            <h:panelGrid columns="2">
                <h:outputLabel value="Nome: " for="nome" p:class="form-label" />
                <h:inputText id="nome" p:class="form-input" value="#{propietarioBean.propietario.nome}" />

                <h:outputLabel value="CPF: " for="cpf" p:class="form-label" />
                <h:inputText id="cpf" p:placeholder="XXX.XXX.XXX-XX" p:class="form-input"
                    value="#{propietarioBean.propietario.cpf}" />

                <h:outputLabel value="Email: " for="email" p:class="form-label" />
                <h:inputText id="email" p:class="form-input" value="#{propietarioBean.propietario.email}" />

                <h:outputLabel value="Telefone: " for="telefone" p:class="form-label" />
                <h:inputText id="telefone" p:placeholder="XX XXXXX-XXXX" p:class="form-input"
                    value="#{propietarioBean.propietario.telefone}" />

                <h:outputLabel value="CEP: " for="cep" p:class="form-label" />
                <h:inputText id="cep" p:placeholder="XXXXX-XXX" p:class="form-input"
                    value="#{propietarioBean.propietario.endereco.cep}" />

                <h:outputLabel value="Estado: " for="estado" p:class="form-label" />
                <h:inputText id="estado" p:class="form-input" value="#{propietarioBean.propietario.endereco.estado}" />

                <h:outputLabel value="Cidade: " for="cidade" p:class="form-label" />
                <h:inputText id="cidade" p:class="form-input" value="#{propietarioBean.propietario.endereco.cidade}" />

                <h:outputLabel value="Bairro: " for="bairro" p:class="form-label" />
                <h:inputText id="bairro" p:class="form-input" value="#{propietarioBean.propietario.endereco.bairro}" />

                <h:outputLabel value="Logradouro: " for="logradouro" p:class="form-label" />
                <h:inputText id="logradouro" p:class="form-input"
                    value="#{propietarioBean.propietario.endereco.logradouro}" />

                <h:outputLabel value="Número: " for="numero" p:class="form-label" />
                <h:inputText id="numero" p:type="number" p:class="form-input"
                    value="#{propietarioBean.propietario.endereco.numero}" />

                <h:outputLabel value="Complemento: " for="complemento" p:class="form-label" />
                <h:inputText id="complemento" p:class="form-input"
                    value="#{propietarioBean.propietario.endereco.complemento}" />

                <h:outputLabel />
                <h:commandButton value="Salvar" p:class="form-button" actionListener="#{propietarioBean.salvar}" action="#{propietarioBean.salvar}"/>
            </h:panelGrid>
            <hr />
            <p style="text-align: start; margin-top: 20px;">
                Já tem uma conta? <a style="color:#45a049; text-decoration: none;" href="Login.xhtml">Faça login</a>
            </p>
        </fieldset>
    </h:form>
</h:body>

</html>
